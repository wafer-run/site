# Deep-merged into the wrangler.toml that `impresspress build --target cloudflare`
# generates. Keep deployer-specific extras here so they survive build
# regeneration (the generated wrangler.toml is overwritten every build).

# Bind the worker to wafer.run as a Custom Domain. CF auto-creates AAAA
# records on the wafer.run zone and provisions the cert. Routes are array
# entries — wrangler.rs's deep_merge replaces arrays wholesale, so this
# fully supplies the routing rather than appending to a default.
[[routes]]
pattern        = "wafer.run"
custom_domain  = true
zone_name      = "wafer.run"

[[routes]]
pattern        = "www.wafer.run"
custom_domain  = true
zone_name      = "wafer.run"

# KV namespace for the per-block config-snapshot cache layered over D1.
# Consumed by impresspress-cloudflare::KvCachedD1DatabaseService via env.kv("CONFIG_CACHE").
# Spec: workspace/docs/superpowers/specs/2026-05-22-kv-cached-d1-config-source-design.md
#
# One-time operator setup before first deploy:
#   wrangler kv namespace create CONFIG_CACHE --preview false
# Then replace the `id` placeholder below with the value wrangler prints.
[[kv_namespaces]]
binding = "CONFIG_CACHE"
id      = "f5711780bb824970b54e8f8c2a9b4db2"
