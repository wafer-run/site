name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site
      - name: Checkout wafer-run
        uses: actions/checkout@v4
        with:
          repository: wafer-run/wafer-run
          path: wafer-run
      - name: Checkout solobase
        uses: actions/checkout@v4
        with:
          repository: suppers-ai/solobase
          path: solobase
      - name: Set site env
        run: |
          echo "SUPPERS_AI__AUTH__JWT_SECRET=ci-test-secret-not-for-prod" >> $GITHUB_ENV
          echo "WAFER_RUN__REGISTRY__ADMIN_EMAIL=ci-admin@example.com" >> $GITHUB_ENV
          echo "SOLOBASE_SHARED__AUTH__GITHUB__CLIENT_ID=ci-dummy" >> $GITHUB_ENV
          echo "SOLOBASE_SHARED__AUTH__GITHUB__CLIENT_SECRET=ci-dummy" >> $GITHUB_ENV
          echo "SOLOBASE_SHARED__AUTH__GITHUB__REDIRECT_URL=http://localhost:8090/b/auth/callback/github" >> $GITHUB_ENV
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        working-directory: site
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: site
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        working-directory: site
        run: cargo test

  playwright:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site
      - name: Checkout wafer-run
        uses: actions/checkout@v4
        with:
          repository: wafer-run/wafer-run
          path: wafer-run
      - name: Checkout solobase
        uses: actions/checkout@v4
        with:
          repository: suppers-ai/solobase
          path: solobase
      - name: Set site env
        run: |
          echo "SUPPERS_AI__AUTH__JWT_SECRET=ci-test-secret-not-for-prod" >> $GITHUB_ENV
          echo "WAFER_RUN__REGISTRY__ADMIN_EMAIL=ci-admin@example.com" >> $GITHUB_ENV
          echo "SOLOBASE_SHARED__AUTH__GITHUB__CLIENT_ID=ci-dummy" >> $GITHUB_ENV
          echo "SOLOBASE_SHARED__AUTH__GITHUB__CLIENT_SECRET=ci-dummy" >> $GITHUB_ENV
          echo "SOLOBASE_SHARED__AUTH__GITHUB__REDIRECT_URL=http://localhost:8090/b/auth/callback/github" >> $GITHUB_ENV
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: cargo build --release
        working-directory: site
        run: cargo build --release
      - name: npm ci
        working-directory: site
        run: npm ci
      - name: playwright install
        working-directory: site
        run: npx playwright install --with-deps
      - name: playwright test
        working-directory: site
        run: npx playwright test
